<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>G2 Font Dot Test</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; }
    body { margin: 0; padding: 16px; background: #0c0c0c; color: #eee; }
    #app { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    button { display: block; width: 100%; padding: 14px; margin: 8px 0; font-size: 15px; font-weight: 600; border: 1px solid #3a3a3a; background: #1c1c1c; color: #f2f2f2; border-radius: 8px; cursor: pointer; }
    button:disabled { opacity: 0.4; }
    .primary { background: #2a5fbf; border-color: #3a6fc0; }
    .hint { color: #8f8; font-size: 12px; margin: 4px 0 0; padding: 0 4px; }
    #status { font-size: 13px; padding: 10px; background: #141414; border-radius: 6px; border: 1px solid #262626; margin-top: 12px; }
    #log { font-family: ui-monospace, monospace; font-size: 11px; white-space: pre-wrap; padding: 10px; background: #0a0a0a; border-radius: 6px; border: 1px solid #1f1f1f; max-height: 40vh; overflow: auto; margin-top: 12px; }
    .step { border-top: 1px solid #262626; padding-top: 8px; margin-top: 12px; }
    .step-title { font-weight: bold; color: #bfb; font-size: 13px; }
  </style>
  <script type="module" crossorigin src="/onsa/assets/spriteTest-CaaqS7VI.js"></script>
  <link rel="modulepreload" crossorigin href="/onsa/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/onsa/assets/index-CfEFZ8r1.js">
</head>
<body>
  <div id="app">
    <h1>G2 Font Dot Test</h1>
    <p class="hint">Unicode 文字で G2 にドット絵が描けるか + どれだけ速いかの検証</p>

    <div class="step">
      <div class="step-title">0. 診断</div>
      <button id="btn-diag" class="primary">0. Bridge &amp; Device Info</button>
      <p class="hint">G2 ブリッジ接続確認</p>
    </div>

    <div class="step">
      <div class="step-title">1. Braille 全ドット</div>
      <button id="btn-braille-fill" class="primary">1. ⣿ を 32×6 (64×24 dot) で敷き詰め</button>
      <p class="hint">フォントに点字があれば塗りつぶし。なければ豆腐/・になる</p>
    </div>

    <div class="step">
      <div class="step-title">2. Braille で X</div>
      <button id="btn-braille-x">2. 点字で X を 16×16 dot</button>
    </div>

    <div class="step">
      <div class="step-title">3. Block element で X</div>
      <button id="btn-block-x">3. ▀▄█ で X (点字無しフォールバック)</button>
    </div>

    <div class="step">
      <div class="step-title">4. アニメ速度計測</div>
      <button id="btn-braille-anim">4. 動く点 ×16 frame (textContainerUpgrade)</button>
      <p class="hint">画像送信 (約 1000 ms/回) と比較</p>
    </div>

    <div id="status">Ready — Even Hub アプリから開いてください</div>
    <div id="log"></div>
  </div>
</body>
</html>
